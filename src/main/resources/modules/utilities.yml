enabled: true

# Configuración de comandos individuales
commands:
  # Mesas
  craft:
    enabled: true
  enderchest:
    enabled: true
  anvil:
    enabled: true
  smithing:
    enabled: true
  cartography:
    enabled: true
  grindstone:
    enabled: true
  loom:
    enabled: true
  stonecutter:
    enabled: true
  disposal:
    enabled: true

  # Comandos Existentes
  hat:
    enabled: true
  condense:
    enabled: true
  seen:
    enabled: true
    others-enabled: true
  gamemode:
    enabled: true
  clear:
    enabled: true
    others-enabled: true
  ping:
    enabled: true
    others-enabled: true

  # Comandos de utilidad
  fly:
    enabled: true
    others-enabled: true
  speed:
    enabled: true
    others-enabled: true
  broadcast:
    enabled: true
  helpop:
    enabled: true
    cooldown-seconds: 20
    send-to-console: true
  heal:
    enabled: true  # Cambiar a false para deshabilitar completamente /heal
    others-enabled: true
    cooldown-seconds: 60
  feed:
    enabled: true
    others-enabled: true
  repair:
    enabled: true  # Cambiar a false para deshabilitar completamente /fix
    cooldown-seconds: 60
  nick:
    enabled: true
  skull:
    enabled: true
  suicide:
    enabled: true
  near:
    enabled: true
  top:
    enabled: true
  ptime:
    enabled: true
  pweather:
    enabled: true
  sell:
    enabled: true  # Cambiar a false para deshabilitar completamente /sell (si tienes tu propio sistema)

# Sonidos estéticos para las acciones
sounds:
  craft: "BLOCK_CHEST_OPEN"
  enderchest: "BLOCK_ENDER_CHEST_OPEN"
  anvil: "BLOCK_ANVIL_USE"
  smithing: "BLOCK_SMITHING_TABLE_USE"
  cartography: "UI_CARTOGRAPHY_TABLE_TAKE_RESULT"
  grindstone: "BLOCK_GRINDSTONE_USE"
  loom: "UI_LOOM_TAKE_RESULT"
  stonecutter: "UI_STONECUTTER_TAKE_RESULT"
  disposal: "BLOCK_BARREL_OPEN"
  hat-equip: "ITEM_ARMOR_EQUIP_GENERIC"
  condense: "BLOCK_ANVIL_USE"
  clear-inv: "ENTITY_ITEM_PICKUP"
  gamemode-change: "BLOCK_NOTE_BLOCK_CHIME"
  heal: "ENTITY_PLAYER_LEVELUP"
  broadcast: "BLOCK_NOTE_BLOCK_PLING"
  helpop-send: "UI_BUTTON_CLICK"
  helpop-receive: "BLOCK_NOTE_BLOCK_CHIME"

messages:
  no-permission: "%prefix%<red>No tienes permiso para usar este comando."
  only-players: "%prefix%<red>Solo jugadores pueden usar este comando."
  module-disabled: "%prefix%<red>Este comando está deshabilitado."
  player-not-found: "%prefix%<red>Jugador no encontrado."
  disposal-title: "<dark_gray>Basurero"
  
  # Mensajes de comandos
  hat-success: "%prefix%<green>¡Nuevo sombrero equipado!"
  clear-success: "%prefix%<green>Inventario de <white>%player% <green>limpiado."
  clear-success-self: "%prefix%<green>Tu inventario ha sido limpiado."
  condense-success: "<#33FF33>✓ <#FFD700>Se condensaron <white>%count% <#FFD700>items"
  condense-nothing: "<#FFD700>✘ ¡Nada que condensar!"
  gamemode-success: "%prefix%<green>Modo de juego cambiado a <yellow>%mode%<green>."
  ping-self: "%prefix%<gray>Tu ping es de: <yellow>%ping%ms"
  ping-other: "%prefix%<gray>El ping de <white>%player% <gray>es de: <yellow>%ping%ms"
  
  # Vuelo y Velocidad
  fly-enabled: "%prefix%<gray>Modo vuelo: <green>Activado"
  fly-disabled: "%prefix%<gray>Modo vuelo: <red>Desactivado"
  fly-others: "%prefix%<gray>Modo vuelo de <white>%player%<gray>: <yellow>%state%"
  speed-invalid: "%prefix%<red>La velocidad debe estar entre 1 y 10."
  speed-usage:
    - "%prefix%<gradient:#FFD700:#FFA500>ᴠᴇʟᴏᴄɪᴅᴀᴅ</gradient>"
    - " <#FFD700>⏵ <white>/speed <1-10> <#FFFF99>- Ajusta tu velocidad"
    - " <#FFD700>⏵ <white>/speed <1-10> <jugador> <#FFFF99>- Ajusta velocidad de otro jugador"
  speed-success: "%prefix%<gray>Tu velocidad de <yellow>%type% <gray>ha sido ajustada a <green>%speed%<gray>."
  speed-others: "%prefix%<gray>Velocidad de <yellow>%type% <gray>de <white>%player% <gray>ajustada a <green>%speed%<gray>."

  # Salud y Alimentación
  heal-success: "<#33FF33>✓ <#FFD700>Has sido curado"
  heal-others: "<#33FF33>✓ <#FFD700>Has curado a <white>%player%"
  feed-success: "<#33FF33>✓ <#FFD700>Hambre saciada"
  feed-others: "<#33FF33>✓ <#FFD700>Has alimentado a <white>%player%"
  
  # Otros
  broadcast-usage:
    - "%prefix%<gradient:#FFD700:#FFA500>ᴀɴᴜɴᴄɪᴏ</gradient>"
    - " <#FFD700>⏵ <white>/broadcast <mensaje> <#FFFF99>- Anuncia a todos los jugadores"
    - " <#FFD700>⏵ <white>/vubroadcast <mensaje> <#FFFF99>- Versión silenciosa sin notificación"
  broadcast-format:
    - ' '
    - '{center}<gradient:#FFD700:#FFA500>🔔 <bold>¡ᴀɴᴜɴᴄɪᴏ ɪᴍᴘᴏʀᴛᴀɴᴛᴇ!</bold> 🔔</gradient>'
    - '{center}<white>%message%'
    - ' '
  helpop-usage:
    - "%prefix%<gradient:#FFD700:#FFA500>ᴀʏᴜᴅᴀ</gradient>"
    - " <#FFD700>⏵ <white>/helpop <mensaje> <#FFFF99>- Reporta un problema al staff"
  helpop-sent: "%prefix%<green>Tu reporte fue enviado al staff <gray>(<white>%staff%<gray>)."
  helpop-no-staff: "%prefix%<yellow>No hay staff conectado ahora. Tu mensaje fue enviado a consola."
  helpop-cooldown: "%prefix%<red>Espera <yellow>%time%s <red>antes de volver a usar /helpop."
  helpop-received: "<dark_gray>[<red>ʜᴇʟᴘᴏᴘ<dark_gray>] <white>%player% <gray>» <white>%message%"
  repair-success: "<#33FF33>✓ <#FFD700>Item reparado"
  repair-usage:
    - "%prefix%<gradient:#FFD700:#FFA500>ʀᴇᴘᴀʀᴀᴄɪᴏɴ</gradient>"
    - " <#FFD700>⏵ <white>/fix hand <#FFFF99>- Repara el item en tu mano"
  repair-error: "<#FF0000>✘ <#FFD700>Este item no se puede reparar"
  heal-cooldown: "%prefix%<red>Espera <yellow>%time%s <red>antes de volver a usar /heal."
  repair-cooldown: "%prefix%<red>Espera <yellow>%time%s <red>antes de volver a usar /fix."
  nick-usage:
    - "%prefix%<gradient:#FFD700:#FFA500>ᴀᴘᴏᴅᴏ</gradient>"
    - " <#FFD700>⏵ <white>/nick <apodo> <#FFFF99>- Cambia tu apodo en el servidor"
    - " <#FFD700>⏵ <white>/nick off <#FFFF99>- Desactiva tu apodo"
  nick-usage-others:
    - "%prefix%<gradient:#FFD700:#FFA500>ᴀᴘᴏᴅᴏ</gradient> <#FFFF99>[Admin]"
    - " <#FFD700>⏵ <white>/nick <jugador> <apodo> <#FFFF99>- Cambia apodo de otro jugador"
    - " <#FFD700>⏵ <white>/nick <jugador> off <#FFFF99>- Remueve apodo de otro jugador"
  nick-format-not-allowed: "<#FF0000>✘ ¡Formato no permitido! <#FFD700>Nivel: <#FFFF99>%tier% <#DDDDDD>| <#FFFF99>%allowed%"
  nick-success: "<#33FF33>✓ <#FFD700>Tu apodo: <white>%nick%"
  nick-off: "<#FF0000>✘ <#FFD700>Apodo desactivado"
  nick-off-others: "%prefix%<gray>Has quitado el apodo de <white>%player%<gray>."
  skull-success: "%prefix%<green>Has recibido la cabeza de <white>%player%<green>."
  suicide-msg: "%prefix%<gray>Has decidido terminar con todo..."
  top-success: "<#33FF33>✓ <#FFD700>Teletransportado a la superficie"
  ptime-usage:
    - "%prefix%<gradient:#FFD700:#FFA500>ᴛɪᴇᴍᴘᴏ</gradient>"
    - " <#FFD700>⏵ <white>/ptime <day|night|reset|ticks> <#FFFF99>- Ajusta tu tiempo personal"
  ptime-set: "%prefix%<green>Tiempo personal cambiado a <yellow>%value%<green>."
  ptime-reset: "%prefix%<green>Tiempo personal reseteado."
  pweather-usage:
    - "%prefix%<gradient:#FFD700:#FFA500>ᴄʟɪᴍᴀ</gradient>"
    - " <#FFD700>⏵ <white>/pweather <clear|rain|reset> <#FFFF99>- Ajusta tu clima personal"
  pweather-set: "%prefix%<green>Clima personal cambiado a <yellow>%value%<green>."
  pweather-reset: "%prefix%<green>Clima personal reseteado."
  sell-usage:
    - "%prefix%<gradient:#FFD700:#FFA500>ᴠᴇɴᴛᴀꜱ</gradient>"
    - " <#FFD700>⏵ <white>/sell hand <#FFFF99>- Vende el item en tu mano"
    - " <#FFD700>⏵ <white>/sell inventory <#FFFF99>- Vende todo tu inventario"
    - " <#FF9999>✘ Solo items vanilla (sin encanto, daño o personalización)"
  sell-disabled: "%prefix%<red>El sistema de venta está deshabilitado."
  sell-economy-missing: "<#FF0000>✘ Economía no configurada."
  sell-nothing: "<#FFD700>✘ ¡No tienes items vendibles!"
  sell-success: "<#33FF33>✓ <#FFD700>¡Has vendido <white>%items% <#33FF33>items por <#FFD700>$%amount%<#33FF33>!"
  sell-enchanted: "<#FF0000>✘ ¡No puedes vender items encantados!"
  sell-damaged: "<#FF0000>✘ ¡Los items deben estar en perfecto estado!"
  sell-custom: "<#FF0000>✘ ¡No puedes vender items personalizados!"
  near-format: "<gradient:#FFD700:#FFA500>ᴊᴜɢᴀᴅᴏʀᴇꜱ</gradient> <#FFA500>Cercanos | <#FFD700>⏵ <white>%players%"
  near-none: "<#FFD700>✘ ¡No hay jugadores cerca!"

  # SEEN
  seen-format:
    - " "
    - "<gradient:#FFD700:#FFA500>☆ ɪɴꜰᴏʀᴍᴀᴄɪóɴ ᴅᴇʟ ᴊᴜɢᴀᴅᴏʀ: <white>%player%</gradient>"
    - " <#FFD700>⏵ <gray>Estado: <white>%status%"
    - " <#FFD700>⏵ <gray>UUID: <white>%uuid%"
    - " <#FFD700>⏵ <gray>Ingreso: <white>%first_join%"
    - " <#FFD700>⏵ <gray>Última sesión: <white>%last_seen%"
    - ""
    - "<gradient:#FFD700:#FFA500>☆ ᴇꜱᴛᴀᴅᴏ ᴀᴄᴛᴜᴀʟ</gradient>"
    - " <#FFD700>⏵ <gray>Mundo: <white>%world% <#FFFF99>(%x%, %y%, %z%)"
    - " <#FFD700>⏵ <red>❤ %health% <gray>| <#FFD700>🍖 %hunger%"
    - " <#FFD700>⏵ <green>XP: <white>Nivel %xp% <gray>| Modo: <white>%gamemode%"
    - " <#FFD700>⏵ <gray>Vuelo: <white>%fly%"
    - " "
  seen-online: "<#33FF33>✓ Online"
  seen-offline: "<#FFD700>✘ Offline hace <white>%time%"
  seen-usage:
    - "%prefix%<gradient:#FFD700:#FFA500>ɪɴꜰᴏʀᴍᴀᴄɪᴏɴ</gradient>"
    - " <#FFD700>⏵ <white>/seen <jugador> <#FFFF99>- Ver info de un jugador"
