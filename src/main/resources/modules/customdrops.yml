enabled: false

defaults:
  anti-farm:
    radius: 16
    max-same-type: 6
  sound:
    radius: 16
  mythic:
    # Si es true, los mobs de MythicMobs NO usan drops vanilla por EntityType.
    # Solo dropean si tienen regla en mythic-drops.
    ignore-mythic-for-vanilla-drops: true

templates:
  figure:
    chance-percent: 0.1
    killer-required: false
    broadcast-enabled: true
    broadcast: "<gold><bold>★ ¡Figura encontrada!</bold> <reset><white>%player% <gray>consiguio <white>%display% <gray>[#%number%]"
    sound-sequence:
      steps:
        1:
          sound: ENTITY_EXPERIENCE_ORB_PICKUP
          volume: 1.0
          pitch: 0.5
          delay-ticks: 0
        2:
          sound: ENTITY_EXPERIENCE_ORB_PICKUP
          volume: 1.0
          pitch: 0.7
          delay-ticks: 4
        3:
          sound: ENTITY_EXPERIENCE_ORB_PICKUP
          volume: 1.0
          pitch: 0.9
          delay-ticks: 8
        4:
          sound: ENTITY_EXPERIENCE_ORB_PICKUP
          volume: 1.0
          pitch: 1.1
          delay-ticks: 12
        5:
          sound: ENTITY_EXPERIENCE_ORB_PICKUP
          volume: 1.0
          pitch: 1.4
          delay-ticks: 16
        6:
          sound: ENTITY_EXPERIENCE_ORB_PICKUP
          volume: 1.0
          pitch: 1.8
          delay-ticks: 20

